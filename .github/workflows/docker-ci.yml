name: Docker CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t pdfgenz-platformops-lab:latest .

      - name: Test Container
        run: |
          docker run -d -p 8080:80 --name pdfgenz-test pdfgenz-platformops-lab:latest
          sleep 5
          curl http://localhost:8080
          docker stop pdfgenz-test
